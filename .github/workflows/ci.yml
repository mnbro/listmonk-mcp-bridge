name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Check lockfile freshness
        run: uv lock --check

      - name: Sync dependencies
        run: uv sync --locked --all-extras

      - name: Run linting
        run: uv run ruff check .

      - name: Run tests
        run: uv run python -m pytest

      - name: Run type checking
        run: uv run python -m mypy src tests

      - name: Build package
        run: uv build

      - name: Check installed package compatibility
        run: uv pip check

  nix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Check flake compatibility
        run: nix flake check
