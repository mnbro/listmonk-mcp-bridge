name: Release Please

on:
  push:
    branches:
      - master

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    env:
      RELEASE_PLEASE_BRANCH: release-please--branches--master--components--listmonk-mcp-bridge
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GH_TOKEN_FOR_UPDATES || github.token }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

      - name: Checkout release branch
        if: steps.release.outputs.prs_created == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN_FOR_UPDATES || github.token }}

      - name: Install uv
        if: steps.release.outputs.prs_created == 'true'
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.9.30"
          enable-cache: true

      - name: Sync uv.lock in release PR
        if: steps.release.outputs.prs_created == 'true'
        run: |
          git fetch origin "$RELEASE_PLEASE_BRANCH"
          git switch "$RELEASE_PLEASE_BRANCH"
          uv lock --upgrade-package listmonk-mcp-bridge
          if ! git diff --quiet uv.lock; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add uv.lock
            git commit --amend --no-edit
            git push --force-with-lease origin "$RELEASE_PLEASE_BRANCH"
          else
            echo "uv.lock is already up to date."
          fi
