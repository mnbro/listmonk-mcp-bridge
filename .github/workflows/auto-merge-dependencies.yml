name: Auto-merge Dependency Updates

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge for bot dependency PRs
        if: >
          !github.event.pull_request.draft &&
          contains(fromJSON('["dependabot[bot]", "github-actions[bot]"]'), github.event.pull_request.user.login)
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr merge "$PR_URL" --auto --squash --delete-branch || \
            echo "Native auto-merge could not be enabled; the workflow_run fallback will merge after CI succeeds."

  merge-after-ci:
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0]
    runs-on: ubuntu-latest
    steps:
      - name: Merge successful bot dependency PRs
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          REPO: ${{ github.repository }}
        run: |
          author="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json author --jq .author.login)"
          case "$author" in
            "dependabot[bot]"|"github-actions[bot]")
              gh pr merge "$PR_NUMBER" --repo "$REPO" --squash --delete-branch
              ;;
            *)
              echo "Skipping PR #$PR_NUMBER from $author"
              ;;
          esac
