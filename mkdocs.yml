site_name: Listmonk MCP Bridge
site_description: MCP server for Listmonk newsletter management
site_author: mnbro
site_url: https://mnbro.github.io/listmonk-mcp-bridge/
repo_url: https://github.com/mnbro/listmonk-mcp-bridge

theme:
  name: material
  features:
    - navigation.sections
    - navigation.instant
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

nav:
  - Overview: index.md
  - Container Image: container.md
  - Claude Desktop: claude-desktop.md
  - VS Code: vscode.md
  - Cline: cline.md
  - Windsurf & Cursor: windsurf-cursor.md
  - Listmonk Docker Setup: docker-setup.md

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true

strict: true
