site_name: Listmonk MCP Bridge
site_description: MCP server for Listmonk newsletter management
site_author: mnbro
site_url: https://mnbro.github.io/listmonk-mcp-bridge/
repo_url: https://github.com/mnbro/listmonk-mcp-bridge
repo_name: v0.4.4

theme:
  name: material
  features:
    - navigation.sections
    - navigation.instant
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

nav:
  - Overview: index.md
  - Configuration: configuration.md
  - Docker: docker.md
  - Tool List: tools.md
  - MCP Clients: mcp-clients.md
  - API Coverage: api-coverage.md
  - Safeguards: safeguards.md
  - Claude Desktop: claude-desktop.md
  - VS Code: vscode.md
  - Cline: cline.md
  - Windsurf & Cursor: windsurf-cursor.md
  - Listmonk Docker Setup: docker-setup.md
  - Development: development.md

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true

strict: true
